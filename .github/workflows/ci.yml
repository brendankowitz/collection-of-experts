name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --logger trx --filter "Category!=Integration"

  web-chat:
    name: Web Chat Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-chat/package-lock.json

      - name: Install
        run: npm ci
        working-directory: web-chat

      - name: Build
        run: npm run build
        working-directory: web-chat

  vscode-extension:
    name: VS Code Extension Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install
        run: npm ci
        working-directory: vscode-extension

      - name: Compile
        run: npm run compile
        working-directory: vscode-extension
