version: '3.8'

services:
  agenthost:
    build:
      context: .
      dockerfile: src/AgentHost/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - Indexing__Qdrant__Host=qdrant
      - Indexing__Qdrant__GrpcPort=6334
      - Indexing__Postgres__ConnectionString=Host=postgres;Database=experts;Username=experts;Password=experts
      - Indexing__RepoCacheDir=/var/cache/agenthost/repos
    volumes:
      - clone-cache:/var/cache/agenthost/repos
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - expert-agents

  webchat:
    build:
      context: ./web-chat
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - agenthost
    networks:
      - expert-agents

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - expert-agents

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: experts
      POSTGRES_PASSWORD: experts
      POSTGRES_DB: experts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U experts -d experts"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - expert-agents

volumes:
  qdrant_storage:
  postgres_data:
  clone-cache:

networks:
  expert-agents:
    driver: bridge
